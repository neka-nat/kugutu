<g>
  <!-- Wide-awake eye: tall aperture so sclera shows above and below a
       same-size pupil (not just a scaled-up round eye), two-tone iris and
       a second sparkle for an alert, surprised look. -->
  <ellipse cx="0" cy="-0.5" rx="15.5" ry="18.5" fill="#FFFFFF" data-kugutu-color-preserve />
  <circle cx="0" cy="1.5" r="7.6" fill="#34344A" />
  <circle cx="0" cy="1.5" r="3.6" fill="#566089" />
  <circle cx="-2.8" cy="-1.6" r="3.1" fill="#FFFFFF" data-kugutu-color-preserve />
  <circle cx="3.2" cy="3.6" r="1.6" fill="#FFFFFF" opacity="0.85" data-kugutu-color-preserve />
</g>

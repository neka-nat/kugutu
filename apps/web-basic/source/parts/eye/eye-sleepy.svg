<g>
  <!-- Half-lidded sleepy eye: a heavy upper lid drooping at the outer corner,
       with only the lower half of the iris peeking out beneath it and a faint
       lower lash line. Reads as drowsy rather than a closed happy arc. -->
  <path d="M-12 -1.5 Q-1 2 12 0.5" fill="none" stroke="#34344A" stroke-width="3.6" stroke-linecap="round" />
  <path d="M-6.5 2.5 A6.5 6.5 0 0 0 6.5 2.5 Z" fill="#34344A" />
  <path d="M-7 3.5 Q0 5.4 7 3.5" fill="none" stroke="#34344A" stroke-width="1.8" stroke-linecap="round" opacity="0.45" />
</g>

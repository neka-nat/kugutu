<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 320 320"
  fill="none"
  role="img"
>
  <title>Kugutu Mascot - Refined</title>
  
  <!-- Torso -->
  <g id="torso_group">
    <path
      d="M100 260C100 230 130 220 160 220C190 220 220 230 220 260V310H100V260Z"
      fill="#93C5FD"
    />
    <path
      d="M140 225L160 240L180 225"
      stroke="white"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.6"
    />
  </g>

  <!-- Neck -->
  <g id="neck_group">
    <rect x="148" y="210" width="24" height="20" rx="10" fill="#FFE4E6" />
  </g>

  <!-- Head Group -->
  <g id="head_group">
    <!-- Hair Back -->
    <g id="hair_back">
      <path
        d="M80 140C80 90 110 60 160 60C210 60 240 90 240 140V180H80V140Z"
        fill="#1E293B"
      />
    </g>

    <!-- Skin -->
    <circle cx="160" cy="140" r="80" fill="#FFF1F2" />
    
    <!-- Blush -->
    <circle cx="110" cy="165" r="8" fill="#FDA4AF" opacity="0.4" />
    <circle cx="210" cy="165" r="8" fill="#FDA4AF" opacity="0.4" />

    <!-- Brows -->
    <g id="brow_left">
      <path d="M115 110C125 105 135 105 145 110" stroke="#334155" stroke-width="4" stroke-linecap="round" />
    </g>
    <g id="brow_right">
      <path d="M175 110C185 105 195 105 205 110" stroke="#334155" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- Eyes -->
    <g id="eye_left">
      <circle cx="130" cy="140" r="16" fill="white" />
      <g id="pupil_left">
        <circle cx="130" cy="140" r="8" fill="#1E293B" />
        <circle cx="133" cy="137" r="3" fill="white" />
      </g>
    </g>
    <g id="eye_right">
      <circle cx="190" cy="140" r="16" fill="white" />
      <g id="pupil_right">
        <circle cx="190" cy="140" r="8" fill="#1E293B" />
        <circle cx="193" cy="137" r="3" fill="white" />
      </g>
    </g>

    <!-- Nose -->
    <g id="nose">
      <path d="M160 150L155 162H164" stroke="#FDA4AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Mouth -->
    <g id="mouth_group">
      <rect x="150" y="175" width="20" height="10" rx="5" fill="#FB7185" />
    </g>

    <!-- Hair Bangs (Front) -->
    <g id="hair_front">
      <path
        d="M80 140C80 100 110 80 160 80C210 80 240 100 240 140C240 120 220 100 160 100C100 100 80 120 80 140Z"
        fill="#1E293B"
      />
    </g>
  </g>
</svg>

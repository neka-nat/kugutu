<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 320 320"
  fill="none"
  role="img"
>
  <style id="kugutu-parts-style">
[data-kugutu-variant-slot="face"] { display: none; }
[data-kugutu-variant-slot="face"][data-kugutu-variant-id="face-round"] { display: inline; }
[data-kugutu-variant-slot="hair.back"] { display: none; }
[data-kugutu-variant-slot="hair.back"][data-kugutu-variant-id="hair-back-bob"] { display: inline; }
[data-kugutu-variant-slot="hair.front"] { display: none; }
[data-kugutu-variant-slot="hair.front"][data-kugutu-variant-id="hair-front-bangs"] { display: inline; }
[data-kugutu-variant-slot="eye"] { display: none; }
[data-kugutu-variant-slot="eye"][data-kugutu-variant-id="eye-round"] { display: inline; }
[data-kugutu-variant-slot="brow"] { display: none; }
[data-kugutu-variant-slot="brow"][data-kugutu-variant-id="brow-soft"] { display: inline; }
[data-kugutu-variant-slot="nose"] { display: none; }
[data-kugutu-variant-slot="nose"][data-kugutu-variant-id="nose-dot"] { display: inline; }
[data-kugutu-variant-slot="mouth"] { display: none; }
[data-kugutu-variant-slot="mouth"][data-kugutu-variant-id="mouth-smile"] { display: inline; }
[data-kugutu-variant-slot="outfit"] { display: none; }
[data-kugutu-variant-slot="outfit"][data-kugutu-variant-id="outfit-tee"] { display: inline; }
</style>
  <title>Kugutu Mascot Rig</title>
  <!--
    Unified-art-direction rig. Face/hair/feature parts are file fragments drawn
    around their own local origin and injected at the anchor mounts below
    (data-kugutu-slot-mount). Paired slots (eye, brow) have a left mount and a
    mirrored right mount, so a single part fragment fills both sides.

    Palette tokens (apply consistently across all part fragments):
      skin        #FAD0B0    skin-shade  #F3B591
      ink         #34344A    blush       #FF9E9E
      hair        #7C6CF0    hair-shade  #6253D6
      accent      #FF8360    accent-2    #46C2A8
      white       #FFFFFF
  -->

  <ellipse cx="160" cy="296" rx="92" ry="15" fill="#34344A" opacity="0.10" />

  <g id="torso_group">
    <g transform="translate(160 250)">
      <g data-kugutu-slot-mount="outfit"><g data-kugutu-variant-slot="outfit" data-kugutu-variant-id="outfit-tee"><g>
  <path d="M-58 -18 Q-30 -34 0 -34 Q30 -34 58 -18 L70 32 Q0 44 -70 32 Z" fill="#FF8360" />
  <path d="M-22 -30 Q0 -14 22 -30" fill="none" stroke="#E96A4A" stroke-width="4" stroke-linecap="round" />
</g></g><g data-kugutu-variant-slot="outfit" data-kugutu-variant-id="outfit-collar"><g>
  <path d="M-58 -18 Q-30 -34 0 -34 Q30 -34 58 -18 L70 32 Q0 44 -70 32 Z" fill="#FF8360" />
  <path d="M-20 -30 L0 -8 L20 -30 L12 -34 L0 -20 L-12 -34 Z" fill="#FFFFFF" />
</g></g><g data-kugutu-variant-slot="outfit" data-kugutu-variant-id="outfit-hoodie"><g>
  <path d="M-62 -16 Q-30 -34 0 -34 Q30 -34 62 -16 L74 38 Q0 50 -74 38 Z" fill="#46C2A8" />
  <path d="M-28 -28 Q0 -12 28 -28 L23 -2 Q0 8 -23 -2 Z" fill="#3AA890" />
  <path d="M-10 -6 L-10 34" fill="none" stroke="#2E8B76" stroke-width="3.5" stroke-linecap="round" />
  <path d="M10 -6 L10 34" fill="none" stroke="#2E8B76" stroke-width="3.5" stroke-linecap="round" />
</g></g></g>
    </g>
  </g>

  <g id="neck_group">
    <rect x="146" y="192" width="28" height="30" rx="12" fill="#F3B591" />
  </g>

  <g id="head_group">
